<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold App - Download</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <!-- App Header info -->
        <header class="app-header">
            <div class="app-icon-container">
                <div class="app-icon">
                    <!-- Custom Gold App icon -->
                    <span class="icon-text">G</span>
                </div>
            </div>
            <div class="app-meta">
                <h1 class="app-title">Gold App</h1>
                <h2 class="app-release-name" id="release-name-display">Gold App Staging 1.0.0-staging (build 14) Pre-release</h2>
                <p class="app-developer">TDF-Daimonds-Tech</p>
                <div class="app-stats">
                    <!-- <div class="stat">
                        <span class="stat-value">4.9 ★</span>
                        <span class="stat-label">12K Ratings</span>
                    </div> -->
                    <!-- <div class="stat divider">•</div> -->
                    <div class="stat">
                        <span class="stat-value" id="app-size-display">-- MB</span>
                        <span class="stat-label">Size</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Promo Video -->
        <div class="promo-video-container">
            <video controls autoplay muted loop playsinline class="promo-video">
                <source src="WhatsApp%20Video%202026-03-15%20at%2011.39.50%20PM.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Top Download Button -->
        <div class="action-bar">
            <a href="#" id="download-btn" class="install-button loading">
                <span class="btn-text" id="btn-text">Install</span>
                <span class="loader" id="btn-loader"></span>
            </a>
            <p id="version-info" class="version-info">Fetching version...</p>
            <p id="error-msg" class="error-message"></p>
        </div>
        <!-- Screenshots Gallery -->
        <section class="section screenshots-section">
            <h2 class="section-title">Preview</h2>
            <div class="screenshots-container">
                <img src="0.jpeg" alt="App Screenshot 1" class="screenshot">
                <img src="1.jpeg" alt="App Screenshot 2" class="screenshot">
                <img src="2.jpeg" alt="App Screenshot 3" class="screenshot">
                <img src="3.jpeg" alt="App Screenshot 4" class="screenshot">
                <img src="4.jpeg" alt="App Screenshot 5" class="screenshot">
                <img src="5.jpeg" alt="App Screenshot 6" class="screenshot">
                <img src="6.jpeg" alt="App Screenshot 7" class="screenshot">
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
